<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>寶可夢輪播圖鑑</title>
    <style>
        body { background: radial-gradient(circle, #2c3e50, #000); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        /* 搜尋列 */
        .header { margin-top: 20px; text-align: center; z-index: 10; }
        input { padding: 12px; border-radius: 25px; border: none; width: 200px; outline: none; }
        button { padding: 12px 20px; border-radius: 25px; border: none; background: #ff5050; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff7675; }

        /* 輪播主容器 */
        .carousel-view {
            position: relative;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 240px;
            height: 340px;
            transform-style: preserve-3d;
        }

        /* 卡牌樣式 */
        .pokemon-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            user-select: none;
            cursor: pointer;
        }

        .pokemon-card img { width: 160px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .pokemon-card h2 { margin: 10px 0; font-size: 1.5rem; text-transform: capitalize; }
        .pokemon-card .id-tag { background: #fccf00; color: #333; padding: 2px 10px; border-radius: 10px; font-weight: bold; }

        /* 導覽按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 20px;
            cursor: pointer;
            z-index: 100;
            border-radius: 50%;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.4); }
        .prev { left: 50px; }
        .next { right: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>POKÉDEX CAROUSEL</h1>
        <input type="text" id="pokeInput" placeholder="輸入名稱 (如: mewtwo)">
        <button onclick="fetchNewPokemon()">加入圖鑑</button>
    </div>

    <div class="carousel-view">
        <button class="nav-btn prev" onclick="move(-1)">&#10094;</button>
        
        <div class="card-container" id="container">
            </div>

        <button class="nav-btn next" onclick="move(1)">&#10095;</button>
    </div>

    <script>
        let pokemonList = [];
        let currentIndex = 0;

        // 初始化：抓取前 7 隻
        async function init() {
            for(let i=1; i<=7; i++) {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${i}`);
                const data = await res.json();
                pokemonList.push(data);
            }
            updateCarousel();
        }

        // 搜尋並加入
        async function fetchNewPokemon() {
            const name = document.getElementById('pokeInput').value.toLowerCase();
            if(!name) return;
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                const data = await res.json();
                pokemonList.push(data);
                currentIndex = pokemonList.length - 1; // 跳到新抓到的那一張
                updateCarousel();
            } catch { alert("找不到該寶可夢！"); }
        }

        // 核心輪播邏輯
        function updateCarousel() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            pokemonList.forEach((pokemon, i) => {
                const card = document.createElement('div');
                card.className = 'pokemon-card';
                
                // 計算相對位置 (這決定了輪播的視覺順序)
                let offset = i - currentIndex;
                
                // 計算視覺效果
                const absOffset = Math.abs(offset);
                const horizontalShift = offset * 250; // 每張橫移距離
                const scale = 1 - (absOffset * 0.2); // 越遠越小
                const rotateY = offset * -35; // 3D 旋轉角度
                const zIndex = 10 - absOffset; // 中間的最前面
                const opacity = absOffset > 2 ? 0 : 1; // 只顯示中心附近的牌

                card.style.transform = `translateX(${horizontalShift}px) scale(${scale}) rotateY(${rotateY}deg)`;
                card.style.zIndex = zIndex;
                card.style.opacity = opacity;

                card.innerHTML = `
                    <div class="id-tag">#${pokemon.id}</div>
                    <img src="${pokemon.sprites.other['official-artwork'].front_default}">
                    <h2>${pokemon.name}</h2>
                `;

                card.onclick = () => { currentIndex = i; updateCarousel(); };
                container.appendChild(card);
            });
        }

        // 左右按鈕控制
        function move(dir) {
            currentIndex += dir;
            // 循環邏輯
            if (currentIndex < 0) currentIndex = pokemonList.length - 1;
            if (currentIndex >= pokemonList.length) currentIndex = 0;
            updateCarousel();
        }

        init();
    </script>
</body>
</html>
